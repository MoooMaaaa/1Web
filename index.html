// ── Canvas Bar Chart ──
function BarChartCanvas(props){
var data=props.data,labelKey=props.labelKey,valueKey=props.valueKey,maxVal=props.maxVal,colors=props.colors;
var ref=useRef(null);
useEffect(function(){
var canvas=ref.current;if(!canvas||!data||data.length===0)return;
var dpr=window.devicePixelRatio||1;
var w=canvas.parentElement.clientWidth,ht=180;
canvas.width=w*dpr;canvas.height=ht*dpr;
canvas.style.width=w+"px";canvas.style.height=ht+"px";
var ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
ctx.clearRect(0,0,w,ht);
var pad={l:36,r:12,t:12,b:32};
var cw=w-pad.l-pad.r,ch=ht-pad.t-pad.b;
var n=data.length,barW=Math.min(cw/n*0.6,40),gap=(cw-barW*n)/(n+1);
var mx=maxVal||0;
if(!mx)for(var i=0;i<n;i++){var v=data[i][valueKey]||0;if(v>mx)mx=v}
if(mx===0)mx=100;
// grid
ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;
for(var g=0;g<=4;g++){var gy=pad.t+ch-ch*(g/4);
ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(w-pad.r,gy);ctx.stroke();
ctx.fillStyle="#64748b";ctx.font="10px sans-serif";ctx.textAlign="right";
ctx.fillText(Math.round(mx*g/4),pad.l-4,gy+3);
}
// bars
for(var i=0;i<n;i++){
var val=data[i][valueKey]||0;
var x=pad.l+gap+(barW+gap)*i;
var barH=ch*(val/mx);
var y=pad.t+ch-barH;
ctx.fillStyle=colors?colors[i%colors.length]:"#6366f1";
ctx.beginPath();
ctx.roundRect?ctx.roundRect(x,y,barW,barH,4):ctx.fillRect(x,y,barW,barH);
ctx.fill();
// value on top
ctx.fillStyle="#a5b4fc";ctx.font="bold 11px sans-serif";ctx.textAlign="center";
ctx.fillText(val,x+barW/2,y-4);
// label
ctx.fillStyle="#94a3b8";ctx.font="11px sans-serif";
ctx.fillText(data[i][labelKey]||"",x+barW/2,ht-pad.b+14);
}
},[data,labelKey,valueKey,maxVal,colors]);
return h("canvas",{ref:ref,style:{width:"100%"}});
}

// ── Canvas Line Chart ──
function LineChartCanvas(props){
var data=props.data,labelKey=props.labelKey,lines=props.lines; // lines: [{key,color,dash}]
var ref=useRef(null);
useEffect(function(){
var canvas=ref.current;if(!canvas||!data||data.length===0)return;
var dpr=window.devicePixelRatio||1;
var w=canvas.parentElement.clientWidth,ht=200;
canvas.width=w*dpr;canvas.height=ht*dpr;
canvas.style.width=w+"px";canvas.style.height=ht+"px";
var ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
ctx.clearRect(0,0,w,ht);
var pad={l:36,r:12,t:12,b:44};
var cw=w-pad.l-pad.r,ch=ht-pad.t-pad.b;
var n=data.length;
// find max
var mx=0;
for(var i=0;i<n;i++)for(var li=0;li<lines.length;li++){var v=data[i][lines[li].key]||0;if(v>mx)mx=v}
if(mx===0)mx=100;mx=mx*1.1;
// grid
ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;
for(var g=0;g<=4;g++){var gy=pad.t+ch-ch*(g/4);
ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(w-pad.r,gy);ctx.stroke();
ctx.fillStyle="#64748b";ctx.font="10px sans-serif";ctx.textAlign="right";
ctx.fillText(Math.round(mx*g/4),pad.l-4,gy+3);
}
// x labels
for(var i=0;i<n;i++){
var x=n===1?pad.l+cw/2:pad.l+cw*i/(n-1);
ctx.fillStyle="#94a3b8";ctx.font="11px sans-serif";ctx.textAlign="center";
ctx.fillText(data[i][labelKey]||"",x,ht-pad.b+14);
}
// lines
for(var li=0;li<lines.length;li++){
var ln=lines[li];
ctx.strokeStyle=ln.color;ctx.lineWidth=ln.dash?1.5:2;
if(ln.dash)ctx.setLineDash([5,3]);else ctx.setLineDash([]);
ctx.beginPath();
for(var i=0;i<n;i++){
var x=n===1?pad.l+cw/2:pad.l+cw*i/(n-1);
var y=pad.t+ch-ch*((data[i][ln.key]||0)/mx);
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.stroke();
// dots
ctx.setLineDash([]);
for(var i=0;i<n;i++){
var x=n===1?pad.l+cw/2:pad.l+cw*i/(n-1);
var y=pad.t+ch-ch*((data[i][ln.key]||0)/mx);
ctx.fillStyle=ln.color;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
}
}
// legend
var lx=pad.l;
ctx.font="11px sans-serif";
for(var li=0;li<lines.length;li++){
ctx.fillStyle=lines[li].color;
ctx.fillRect(lx,ht-14,12,3);
ctx.fillStyle="#94a3b8";
ctx.textAlign="left";
ctx.fillText(lines[li].key,lx+16,ht-10);
lx+=ctx.measureText(lines[li].key).width+30;
}
},[data,labelKey,lines]);
return h("canvas",{ref:ref,style:{width:"100%"}});
}

function expandRange(input){
var tokens=input.split(/[\n,，\s]+/).map(function(s){return s.trim()}).filter(Boolean);
var result=[];
tokens.forEach(function(tok){
var m=tok.match(/^(\d+)\s*[-—~～]\s*(\d+)$/);
if(m){var s=parseInt(m[1]),e=parseInt(m[2]);if(s>e){var t=s;s=e;e=t}for(var i=s;i<=e;i++)result.push(String(i))}
else result.push(tok);
});
return result;
}

function parseScores(text){
var scores={};if(!text||!text.trim())return scores;
var pairs=text.trim().split("..");
pairs.forEach(function(pair){
pair=pair.trim();if(!pair)return;
var ld=pair.lastIndexOf(".");if(ld<=0)return;
var id=pair.substring(0,ld).trim(),sc=pair.substring(ld+1).trim();
if(id&&sc&&!isNaN(Number(sc)))scores[id]=Number(sc);
});
return scores;
}
